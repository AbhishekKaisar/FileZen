# Keep heap + metaspace well below physical RAM (this machine ~7GB). Huge values
# crash the Gradle daemon with native OOM — see hs_err_pid*.log in this folder.
# After changing this file: run `android\gradlew.bat --stop` then build again.
org.gradle.jvmargs=-Xmx1536m -XX:MaxMetaspaceSize=384m -XX:ReservedCodeCacheSize=192m -XX:+HeapDumpOnOutOfMemoryError
org.gradle.workers.max=2
org.gradle.parallel=false
android.useAndroidX=true
android.enableJetifier=true
kotlin.daemon.jvmargs=-Xmx512m
